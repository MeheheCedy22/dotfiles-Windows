[os]
disabled = false

[username]
style_user = "green bold"
style_root = "red bold"
# format = "[$user]($style) рҹҢҡ "
format = "[$user]($style)[@](purple bold)"
disabled = false
show_always = true

[hostname]
ssh_only = false
ssh_symbol = 'рҹҢҗ '
format = '[$hostname](bold yellow) '
disabled = false

[directory]
read_only = " у°Ңҫ"
truncation_length = 5
truncate_to_repo = true
truncation_symbol = "...\\"
style = "bold italic blue"
home_symbol = "C:\\Users\\marek"

[shell]
disabled = false
format = '[$indicator]($style)' # removed space from default
unknown_indicator = 'unknown shell'
powershell_indicator = 'psh'
pwsh_indicator = 'pwsh'

# Replace the "вқҜ" symbol in the prompt with "вһң"
# Replace the "вң—" symbol in the prompt with ""
[character]
# format = '$symbol' # removed space from default
success_symbol = "[вқҜ](bold cyan)"
error_symbol = "[вң—](bold red)"

[memory_usage]
symbol = 'рҹҗҸ '
threshold = 85 # default: 75
format = '$symbol[${ram_pct}|${swap_pct}]($style) '
disabled = false

[cmd_duration]
# min_time = 1 # in [ms], default: 2_000
# show_milliseconds = true
disabled = false
style = "bold italic red"

[sudo]
symbol = 'рҹ§ҷ '
style = 'bold blue'
disabled = false

# [time]
# disabled = false

[c]
disabled = false

[java]
symbol = 'вҳ• '
disabled = false

[python]
symbol = 'рҹҗҚ '
disabled = false

[cmake]
symbol = 'рҹӣ пёҸ '
disabled = false

